name: Deploy market board to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 8:15 AM ET during daylight time; 7:15 AM ET during standard time.
    # Both are pre-market and avoid the opening-bell freeze gate.
    - cron: "15 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install market-data dependencies
        run: python -m pip install "yfinance>=0.2.40" "pandas>=2.0" "numpy>=1.24"

      - name: Generate latest public board snapshot
        run: python engine/generate_board.py

      - name: Build public-only Pages artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site/data
          cp index.html _site/index.html
          cp -R assets _site/assets
          cp data/board_today.json _site/data/board_today.json
          printf 'window.BOARD_PUBLIC_STATIC = true;\n' > _site/assets/js/runtime-config.js
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
